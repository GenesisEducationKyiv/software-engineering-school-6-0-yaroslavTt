<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Subscriptions — GitHub Release Notifier</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                background: #0d1117;
                color: #e6edf3;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }

            .card {
                background: #161b22;
                border: 1px solid #30363d;
                border-radius: 12px;
                padding: 40px;
                width: 100%;
                max-width: 480px;
            }

            .logo {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 28px;
            }

            .logo svg {
                color: #e6edf3;
            }

            h1 {
                font-size: 20px;
                font-weight: 600;
                color: #e6edf3;
            }

            p.subtitle {
                font-size: 14px;
                color: #8b949e;
                margin-top: 4px;
            }

            .form {
                margin-top: 28px;
                display: flex;
                gap: 8px;
            }

            input {
                flex: 1;
                padding: 10px 14px;
                background: #0d1117;
                border: 1px solid #30363d;
                border-radius: 6px;
                color: #e6edf3;
                font-size: 14px;
                outline: none;
                transition: border-color 0.15s;
            }

            input:focus {
                border-color: #388bfd;
            }
            input::placeholder {
                color: #484f58;
            }

            button {
                padding: 10px 16px;
                background: #238636;
                color: #fff;
                border: none;
                border-radius: 6px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.15s;
                white-space: nowrap;
            }

            button:hover {
                background: #2ea043;
            }
            button:disabled {
                background: #21262d;
                color: #484f58;
                cursor: not-allowed;
            }

            #results {
                margin-top: 24px;
            }

            #message {
                padding: 12px 14px;
                border-radius: 6px;
                font-size: 13px;
                display: none;
            }

            #message.error {
                background: #2a0d0d;
                border: 1px solid #da3633;
                color: #f85149;
                display: block;
            }

            #message.empty {
                background: #161b22;
                border: 1px solid #30363d;
                color: #8b949e;
                display: block;
            }

            #list {
                list-style: none;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .sub-item {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 14px;
                background: #0d1117;
                border: 1px solid #30363d;
                border-radius: 6px;
                font-size: 13px;
            }

            .sub-item svg {
                color: #8b949e;
                flex-shrink: 0;
            }
            .sub-item .repo {
                font-weight: 500;
            }
            .sub-item .tag {
                margin-left: auto;
                color: #8b949e;
                font-size: 12px;
            }

            nav {
                margin-bottom: 16px;
                font-size: 13px;
            }

            nav a {
                color: #388bfd;
                text-decoration: none;
            }

            nav a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <nav><a href="/">&larr; Subscribe</a></nav>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
                    />
                </svg>
                <div>
                    <h1>My Subscriptions</h1>
                    <p class="subtitle">View your active release subscriptions</p>
                </div>
            </div>

            <form class="form" id="searchForm" novalidate>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="you@example.com"
                    autocomplete="email"
                    required
                />
                <button type="submit" id="submitBtn">Search</button>
            </form>

            <div id="results">
                <div id="message" role="alert"></div>
                <ul id="list"></ul>
            </div>
        </div>

        <script>
            const form = document.getElementById('searchForm');
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            const list = document.getElementById('list');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();

                btn.disabled = true;
                msg.className = '';
                msg.style.display = 'none';
                list.innerHTML = '';

                try {
                    const res = await fetch(`/api/subscriptions?email=${encodeURIComponent(email)}`);
                    const data = await res.json();

                    if (!res.ok) {
                        msg.textContent = data.error;
                        msg.className = 'error';
                        return;
                    }

                    if (data.length === 0) {
                        msg.textContent = 'No active subscriptions found for this email.';
                        msg.className = 'empty';
                        return;
                    }

                    data.forEach((sub) => {
                        const li = document.createElement('li');
                        li.className = 'sub-item';
                        li.innerHTML = `
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                        </svg>
                        <span class="repo" data-testid="repo">${sub.repo}</span>
                        ${sub.last_seen_tag ? `<span class="tag">${sub.last_seen_tag}</span>` : ''}
                    `;
                        list.appendChild(li);
                    });
                } catch {
                    msg.textContent = 'Network error — please try again.';
                    msg.className = 'error';
                } finally {
                    btn.disabled = false;
                }
            });
        </script>
    </body>
</html>
